name: Auto Update M3U Playlist

on:
  schedule:
    # Chạy tự động lúc 00:00 UTC (khoảng 7h sáng giờ Việt Nam) hàng ngày
    - cron: '0 0 * * *' 
  workflow_dispatch: # Cho phép bấm chạy thủ công bất cứ lúc nào

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run script to generate M3U
      run: python crawl_epg.py

    - name: Commit and push changes
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Bot"
        git add playlist.m3u
        git commit -m "Auto-update playlist.m3u" || echo "No changes to commit"
        git push
